    <title>My BMW</title>
    <script>
      const launchParams = new URLSearchParams(location.search);
      if (window.__MYBMW_NATIVE_IOS__ || launchParams.get("native") === "1") {
        document.documentElement.classList.add("native-ios");
      }
      if (window.navigator.standalone === true || window.matchMedia("(display-mode: standalone)").matches || launchParams.get("pwa") === "1") {
        document.documentElement.classList.add("pwa-ios");
      }

    <style>
      :root {
        color-scheme: light;
        font-family:
          "BMW Type Next", "BMWTypeNext", "Helvetica Neue",
          "PingFang SC", "Hiragino Sans GB", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
        -webkit-touch-callout: none;
        -webkit-user-drag: none;
        -webkit-user-select: none;
        user-select: none;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 100%;
        overflow: hidden;
        background: #fff;
        -webkit-text-size-adjust: 100%;
      }

      body {
        display: grid;
        place-items: center;
      }

      html.native-ios body,
      html.pwa-ios body {
        place-items: start center;
        background: linear-gradient(180deg, #20264a 0 180px, #fff 180px 100%);
      }

      .viewport {
        position: relative;
        width: calc(430px * var(--app-scale-x, 1));
        height: calc(936px * var(--app-scale-y, 1));
        overflow: hidden;
        background: #fff;
      }

      .screen {
        position: relative;
        width: 430px;
        height: 936px;
        overflow: hidden;
        background: #fff;
        box-shadow: 0 24px 70px rgba(10, 16, 24, 0.22);
        margin-top: var(--native-offset-y, 0px);
        transform: scale(var(--app-scale-x, 1), var(--app-scale-y, 1));
        transform-origin: top left;
      }

      html.native-ios .screen,
      html.pwa-ios .screen {
        box-shadow: none;
      }

      .pwa-bottom-nav {
        display: none;
      }

      html.pwa-ios .pwa-bottom-nav {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 15;
        display: block;
        width: 100vw;
        height: auto;
        pointer-events: none;
      }

      html.pwa-ios .screen.is-editing + .pwa-bottom-nav {
        display: none;
      }

      html:not(.native-ios):not(.pwa-ios) .pwa-bottom-nav {
        position: absolute;
        left: 0;
        bottom: 0;
        z-index: 15;
        display: block;
        width: 100%;
        height: auto;
        pointer-events: none;
      }

      .reference-base {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        pointer-events: none;

        position: absolute;
        left: 0;
        top: 238px;
        width: 430px;
        height: 194px;
        overflow: visible;
        display: none;
        background:

      .vehicle-stage::before {
        content: "";

        left: 174px;
        top: -18px;

        height: 25px;
        border-radius: 999px;

        left: 0;
        top: -1px;
        width: 100%;
        height: 22px;
        background: linear-gradient(180deg, #3f4263 0%, rgba(63, 66, 99, .88) 28%, rgba(63, 66, 99, 0) 100%);

        display: none;
        z-index: 2;

          #414563 0%,
          rgba(65, 69, 99, 0.64) 38%,
          rgba(65, 69, 99, 0) 100%

      .screen.has-custom-vehicle .vehicle-stage::before {

        return `${compact}已从车辆更新`;
      }

      function normalizeVehicle(vehicle, source = "fuelPercent") {
        const fullRangeKm = Math.max(1, Number(vehicle.fullRangeKm || FULL_RANGE_KM));
        const fuelState = calculateFuelState(vehicle, source, fullRangeKm);
        const legacyDoorStates = {
          "已打开": "opened",
          "一切正常": "normal",
          "已关闭": "normal",
          "已锁止": "normal",
          "车辆数据已关闭": "data-off"
        };
        const rawState = String(vehicle.vehicleState || legacyDoorStates[vehicle.doors] || "opened").trim().toLowerCase();
        const stateAliases = {
          open: "opened",
          unlocked: "opened",
          close: "normal",
          closed: "normal",
          lock: "normal",
          locked: "normal",
          offline: "data-off",
          disabled: "data-off"
        };
        const aliasedState = stateAliases[rawState] || rawState;
        const vehicleState = VEHICLE_STATE_VALUES.has(aliasedState) ? aliasedState : "opened";
        const doorsByState = {
          normal: "一切正常",
          opened: "已打开",
          "data-off": "车辆数据已关闭"
        };
        return { ...vehicle, ...fuelState, vehicleState, doors: doorsByState[vehicleState] };
      }

      function readGarageState() {
        try {
          const saved = JSON.parse(localStorage.getItem(GARAGE_STORAGE_KEY) || "{}");
          const modelId = VEHICLE_MODELS.some((model) => model.id === saved.modelId) ? saved.modelId : "530li";
          const color = ["black", "white", "accent"].includes(saved.color) ? saved.color : "black";
          const era = saved.era === "classic" ? "classic" : "current";
          const background = ["original", "letter-blue", "letter-pink"].includes(saved.background)
            ? saved.background
            : "original";
          return { modelId, color: era === "classic" ? "accent" : color, era, background };
        } catch (err) {
          return { modelId: "530li", color: "black", era: "current", background: "original" };
        }
      }

      function persistGarageState() {
        localStorage.setItem(GARAGE_STORAGE_KEY, JSON.stringify(garageState));
      }

      function selectedGarageModel() {
        return VEHICLE_MODELS.find((model) => model.id === garageState.modelId) || VEHICLE_MODELS[0];
      }

      function selectedGarageModelName() {
        const model = selectedGarageModel();
        return garageState.era === "classic" ? model.classicName : model.currentName;
      }

      function selectedGarageAssetId() {
        return garageState.era === "classic" ? `${garageState.modelId}-classic` : garageState.modelId;
      }

      function modelImagePath(modelId = garageState.modelId, color = garageState.color) {
        return `assets/models/${modelId}-${color}.jpg`;
      }

      function modelLayerPath(modelId = garageState.modelId, color = garageState.color) {
        return `assets/vehicle-layers/${modelId}-${color}.png`;
      }

      function fallbackModelImagePath() {
        return `assets/models/530li-${garageState.color === "white" ? "white" : "black"}.jpg`;
      }

      function fitModelName() {
        root.style.setProperty("--model-name-scale", "1");
        requestAnimationFrame(() => {
          const scale = Math.min(1, 330 / Math.max(1, modelName.scrollWidth));
          root.style.setProperty("--model-name-scale", scale.toFixed(3));
        });
      }

      function renderModelName(name) {
        modelName.textContent = name || selectedGarageModelName();
        fitModelName();
      }

      function renderGaragePanel() {
        const visibleModels = VEHICLE_MODELS.filter((model) => model.category === garageCategory);
        garageModelList.innerHTML = visibleModels.map(
          (model) => `
            <button class="garage-model" type="button" data-model-id="${model.id}">
              <span class="garage-model-code">${model.shortName}</span>
              <span class="garage-model-year">${garageState.era === "classic" ? "19–22" : "当前"}</span>
              <span class="garage-model-check">✓</span>
            </button>
          `
        ).join("");
        garageEraButtons.forEach((button) => {
          button.classList.toggle("is-active", button.dataset.era === garageState.era);
        });
        const colorRow = document.querySelector("#garageColorRow");
        if (colorRow) colorRow.classList.toggle("is-classic", garageState.era === "classic");
        garageColorButtons.forEach((button) => {
          button.hidden = garageState.era === "classic" && button.dataset.color !== "accent";
          const label = button.querySelector("span:last-child");
          if (label && button.dataset.color === "accent") {
            label.textContent = garageState.era === "classic" ? "经典色" : "常用色";
          }
        });
        garageCategoryButtons.forEach((button) => {
          button.classList.toggle("is-active", button.dataset.category === garageCategory);
        });
        garageBackgroundButtons.forEach((button) => {
          button.classList.toggle("is-active", button.dataset.background === garageState.background);
        });
      }

      function renderGarageState() {
        const selected = selectedGarageModel();
        const assetId = selectedGarageAssetId();
        const modelDisplayName = selectedGarageModelName();
        const isReferenceBaseVehicle = assetId === "530li" && garageState.color === "black";
        const isBaseVehicle = isReferenceBaseVehicle && garageState.background === "original";
        const layerKey = `${assetId}-${garageState.color}`;
        const crispWebMode = !document.documentElement.classList.contains("native-ios");
        const usesCommonStage = crispWebMode || !isBaseVehicle;
        const layerTuning = VEHICLE_LAYER_TUNING[layerKey] || { scale: 1.08, x: 0, y: 2 };
        const hasLetterBackground = garageState.background.startsWith("letter-");
        const letterScaleByVehicle = {
          "730li-black": 1.02,
          "730li-white": 1.06,
          "730li-accent": 1.04,
        };
        const backgroundScale = hasLetterBackground ? (letterScaleByVehicle[layerKey] ?? 0.96) : 1;
        const renderedScale = layerTuning.scale * backgroundScale;
        const renderedWidth = 430 * renderedScale;
        const renderedHeight = 224 * renderedScale;
        const renderedX = layerTuning.x;
        const renderedY = layerTuning.y + (hasLetterBackground ? 5 : 0);
        root.dataset.vehicleModel = assetId;
        root.dataset.vehicleBaseModel = selected.id;
        root.dataset.vehicleEra = garageState.era;
        root.dataset.vehicleColor = garageState.color;
        root.dataset.vehicleBackground = garageState.background;
        root.style.setProperty("--vehicle-scale", renderedScale.toFixed(3));
        root.style.setProperty("--vehicle-x", `${renderedX}px`);
        root.style.setProperty("--vehicle-y", `${renderedY}px`);
        root.style.setProperty("--vehicle-render-width", `${renderedWidth.toFixed(3)}px`);
        root.style.setProperty("--vehicle-render-height", `${renderedHeight.toFixed(3)}px`);
        root.style.setProperty("--vehicle-render-left", `${((430 - renderedWidth) / 2 + renderedX).toFixed(3)}px`);
        root.style.setProperty("--vehicle-render-top", `${((224 - renderedHeight) / 2 + renderedY).toFixed(3)}px`);
        root.style.setProperty("--vehicle-saturation", layerTuning.saturation ?? 1);
        root.style.setProperty("--garage-accent-color", selected.accent);
        if (garageAccentSwatch) garageAccentSwatch.style.background = selected.accent;
        renderModelName(modelDisplayName);
        root.classList.toggle("has-custom-vehicle", crispWebMode || !isBaseVehicle);
        root.classList.toggle("uses-common-stage", usesCommonStage);
        vehicleStageImage.src = usesCommonStage
          ? modelLayerPath(assetId, garageState.color)
          : isBaseVehicle
            ? "assets/models/530li-black.jpg"
            : modelImagePath(assetId, garageState.color);
        vehicleStageImage.dataset.fallbackSrc = modelLayerPath(
          garageState.era === "classic" ? `${selected.id}-classic` : selected.id,
          garageState.color === "accent" ? "black" : garageState.color
        );
        garageColorButtons.forEach((button) => {
          button.classList.toggle("is-active", button.dataset.color === garageState.color);
        });
        garageModelList.querySelectorAll(".garage-model").forEach((button) => {
          button.classList.toggle("is-active", button.dataset.modelId === selected.id);
        });
        if (currentVehicle) currentVehicle.model = modelDisplayName;
      }

      function openGarage() {
        closeEditor(true);
        garageCategory = selectedGarageModel().category;
        renderGaragePanel();
        renderGarageState();
        root.classList.add("is-garage-open");
      }

      function closeGarage() {
        root.classList.remove("is-garage-open");
      }

      function setGarageState(next) {
        garageState = { ...garageState, ...next };
        persistGarageState();
        renderGaragePanel();
        renderGarageState();
        if (currentVehicle) persistVehicleData({ ...currentVehicle, model: selectedGarageModelName() });
      }

      function renderFuel(vehicle, animate = true) {
        const normalized = normalizeVehicle(vehicle);
        currentVehicle = { ...(currentVehicle || fallback.vehicle), ...normalized };
        if (!animate) root.classList.add("no-transition");
        root.style.setProperty("--fuel-percent", normalized.fuelPercent);
        root.style.setProperty("--fuel-width", `${normalized.fuelPercent}%`);
        root.style.setProperty(
          "--fuel-marker-left",
          `${Math.max(0, (FUEL_TRACK_WIDTH * normalized.fuelPercent) / 100 - FUEL_MARKER_WIDTH)}px`
        );
        const dataIsOff = normalized.vehicleState === "data-off";
        fuelPercentText.textContent = dataIsOff ? "--" : `${normalized.fuelPercent} %`;
        rangeValue.textContent = dataIsOff ? "--" : normalized.rangeKm;
        if (!animate) {
          requestAnimationFrame(() => root.classList.remove("no-transition"));
        }
      }

      function renderVehicleState(vehicle) {
        const state = VEHICLE_STATE_VALUES.has(vehicle.vehicleState) ? vehicle.vehicleState : "opened";
        const labels = {
          normal: "一切正常",
          opened: "已打开",
          "data-off": "车辆数据已关闭"
        };
        root.dataset.vehicleState = state;
        statusCardSubtitle.textContent = labels[state];
        statusStripText.textContent = labels[state];
      }

      function formatSystemTime(date = new Date()) {
        const hours = date.getHours();
        const minutes = String(date.getMinutes()).padStart(2, "0");
        return `${hours}:${minutes}`;
      }

      function syncSystemTime() {
        systemTime.textContent = formatSystemTime();
      }

      function fitViewport() {
        const pwaIOS = document.documentElement.classList.contains("pwa-ios");
        const nativeIOS = document.documentElement.classList.contains("native-ios") || window.__MYBMW_NATIVE_IOS__;
        const widthScale = window.innerWidth / 430;
        const heightScale = window.innerHeight / 936;
        const scale = Math.min(widthScale, heightScale, nativeIOS ? 1.04 : 1);
        const nearReferenceRatio = Math.abs(widthScale - heightScale) < 0.035;
        // Standalone iOS PWAs report less usable height because of system safe
        // areas. Fit them by width and crop only the unused bottom of the fixed
        // canvas. Keeping a uniform scale avoids stretching/rasterising text.
        const pwaScale = widthScale;
        const scaleX = pwaIOS ? pwaScale : (nativeIOS && nearReferenceRatio ? widthScale : scale);
        const scaleY = pwaIOS ? pwaScale : (nativeIOS && nearReferenceRatio ? heightScale : scale);
        document.documentElement.style.setProperty("--app-scale-x", String(Math.max(0.1, scaleX)));
        document.documentElement.style.setProperty("--app-scale-y", String(Math.max(0.1, scaleY)));
        document.documentElement.style.setProperty("--native-offset-y", "0px");
      }

      function renderBatteryStatus(battery) {
        const percent = Math.round(clamp(battery.level * 100, 0, 100));
        batteryPercentText.textContent = percent;
        batteryShell.classList.toggle("is-low", percent <= 20 && !battery.charging);
        batteryShell.classList.toggle("is-charging", Boolean(battery.charging));
        root.classList.add("has-live-battery");
      }

      function fitMapLabelText() {
        root.style.setProperty("--map-community-scale", "1");
        root.style.setProperty("--map-police-scale", "1");
        root.style.setProperty("--map-road-scale", "1");
        requestAnimationFrame(() => {
          const scaleFor = (element, maxWidth) => Math.min(1, maxWidth / Math.max(1, element.scrollWidth));
          root.style.setProperty("--map-community-scale", scaleFor(mapCommunityText, 110).toFixed(3));
          root.style.setProperty("--map-police-scale", scaleFor(mapPoliceText, 124).toFixed(3));
          root.style.setProperty("--map-road-scale", scaleFor(mapRoadText, 112).toFixed(3));
        });
      }

      function renderMapLabels(vehicle) {
        const mapRoad = vehicle.mapRoad || fallback.vehicle.mapRoad;
        const mapCommunity = vehicle.mapCommunity || fallback.vehicle.mapCommunity;
        const mapPolice = vehicle.mapPolice || fallback.vehicle.mapPolice;
        mapRoadText.textContent = mapRoad;
        mapCommunityText.textContent = mapCommunity;
        mapPoliceText.textContent = mapPolice;
        root.classList.toggle("map-road-custom", mapRoad !== fallback.vehicle.mapRoad);
        root.classList.toggle("map-community-custom", mapCommunity !== fallback.vehicle.mapCommunity);
        root.classList.toggle("map-police-custom", mapPolice !== fallback.vehicle.mapPolice);
        fitMapLabelText();
      }

      window.setNativeBatteryStatus = function setNativeBatteryStatus(status) {
        renderBatteryStatus({
          level: Number(status.level),
          charging: Boolean(status.charging)
        });
      };

      function applyVehicleData(vehicle, animate = true, source = "fuelPercent") {
        currentVehicle = normalizeVehicle({ ...(currentVehicle || fallback.vehicle), ...vehicle }, source);
        currentVehicle.model = selectedGarageModelName();
        renderGarageState();
        const lastUpdated = normalizeUpdatedText(currentVehicle.lastUpdated || fallback.vehicle.lastUpdated);
        currentVehicle.lastUpdated = lastUpdated;
        updatedText.textContent = lastUpdated;
        root.classList.toggle("has-custom-updated", lastUpdated !== fallback.vehicle.lastUpdated);
        renderMapLabels(currentVehicle);
        renderVehicleState(currentVehicle);
        renderFuel(currentVehicle, animate);
      }

      function persistVehicleData(vehicle) {
        const data = { vehicle };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      window.setNativeVehicleData = function setNativeVehicleData(vehicle) {
        applyVehicleData(vehicle, true, vehicle.rangeKm != null && vehicle.fuelPercent == null ? "rangeKm" : "fuelPercent");
        persistVehicleData(currentVehicle);
      };

      window.setNativeDefaultVehicleData = function setNativeDefaultVehicleData(vehicle) {
        if (localStorage.getItem(STORAGE_KEY)) return;
        applyVehicleData(vehicle, false, vehicle.rangeKm != null && vehicle.fuelPercent == null ? "rangeKm" : "fuelPercent");
        persistVehicleData(currentVehicle);
      };

      function openEditor() {
        const vehicle = currentVehicle || fallback.vehicle;
        editorSnapshot = { ...vehicle };
        lastEditorFuelSource = "fuelPercent";
        editVehicleState.value = vehicle.vehicleState || "opened";
        editLastUpdated.value = vehicle.lastUpdated || fallback.vehicle.lastUpdated;
        editFuelPercent.value = vehicle.fuelPercent;
        editRangeKm.value = vehicle.rangeKm;
        editMapRoad.value = vehicle.mapRoad || fallback.vehicle.mapRoad;
        editMapCommunity.value = vehicle.mapCommunity || fallback.vehicle.mapCommunity;
        editMapPolice.value = vehicle.mapPolice || fallback.vehicle.mapPolice;
        root.classList.add("is-editing");
      }

      function readEditorVehicle(source = lastEditorFuelSource) {
        const vehicle = {
          ...(currentVehicle || fallback.vehicle),
          vehicleState: editVehicleState.value,
          lastUpdated: normalizeUpdatedText(editLastUpdated.value || fallback.vehicle.lastUpdated),
          fuelPercent: Number(editFuelPercent.value || 0),
          rangeKm: Number(editRangeKm.value || 0),
          mapRoad: editMapRoad.value.trim() || fallback.vehicle.mapRoad,
          mapCommunity: editMapCommunity.value.trim() || fallback.vehicle.mapCommunity,
          mapPolice: editMapPolice.value.trim() || fallback.vehicle.mapPolice,
          fullRangeKm: FULL_RANGE_KM
        };
        vehicle.location = `${vehicle.mapPolice} · ${vehicle.mapRoad}`;
        return normalizeVehicle(vehicle, source);
      }

      function previewEditorData(source = lastEditorFuelSource) {
        if (!root.classList.contains("is-editing")) return;
        lastEditorFuelSource = source;
        applyVehicleData(readEditorVehicle(source), true, source);
      }

      function closeEditor(restoreSnapshot = false) {
        clearTimeout(renderTimer);
        if (restoreSnapshot && editorSnapshot) {
          applyVehicleData(editorSnapshot, true);
        }
        editorSnapshot = null;
        if (document.activeElement && typeof document.activeElement.blur === "function") {
          document.activeElement.blur();
        }
        root.classList.remove("is-editing");
        window.scrollTo(0, 0);
        requestAnimationFrame(() => {
          fitViewport();
          window.scrollTo(0, 0);
        });
        setTimeout(() => {
          fitViewport();
          window.scrollTo(0, 0);
        }, 120);
      }

      async function syncBatteryStatus() {
        if (!("getBattery" in navigator)) {
          root.classList.remove("has-live-battery");
          return false;
        }

        try {
          const battery = await navigator.getBattery();
          const update = () => renderBatteryStatus(battery);
          update();
          battery.addEventListener("levelchange", update);
          battery.addEventListener("chargingchange", update);
          return true;
        } catch (err) {
          root.classList.remove("has-live-battery");
          return false;
        }
      }

      function scheduleRender(vehicle, source = "fuel") {
        clearTimeout(renderTimer);
        renderTimer = setTimeout(() => {
          renderFuel(normalizeVehicle(vehicle, source === "range" ? "rangeKm" : "fuelPercent"));
        }, DEBOUNCE_MS);
      }

      async function loadData() {
        let data = fallback;
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          data = JSON.parse(saved);
        }

        try {
          if (location.protocol !== "file:" || !saved) {
            const apiPath = location.protocol === "file:" ? "vehicle-data.json" : "/api/data";
            const res = await fetch(apiPath, { cache: "no-store" });
            if (res.ok) data = await res.json();
          }
        } catch (err) {
          if (saved) data = JSON.parse(saved);
        }

        const vehicle = data.vehicle || fallback.vehicle;
        applyVehicleData(vehicle, false);
      }

      window.addEventListener("storage", (event) => {
        if (event.key !== STORAGE_KEY || !event.newValue) return;
        const data = JSON.parse(event.newValue);
        applyVehicleData(data.vehicle || fallback.vehicle);
      });

      editVehicleState.addEventListener("change", () => {
        previewEditorData(lastEditorFuelSource);
      });

      editFuelPercent.addEventListener("input", () => {
        lastEditorFuelSource = "fuelPercent";
        clearTimeout(renderTimer);
        renderTimer = setTimeout(() => {
          const fuelState = calculateFuelState({ fuelPercent: editFuelPercent.value }, "fuelPercent", FULL_RANGE_KM);
          editFuelPercent.value = fuelState.fuelPercent;
          editRangeKm.value = fuelState.rangeKm;
          previewEditorData("fuelPercent");
        }, DEBOUNCE_MS);
      });

      editRangeKm.addEventListener("input", () => {
        lastEditorFuelSource = "rangeKm";
        clearTimeout(renderTimer);
        renderTimer = setTimeout(() => {
          const fuelState = calculateFuelState({ rangeKm: editRangeKm.value }, "rangeKm", FULL_RANGE_KM);
          editFuelPercent.value = fuelState.fuelPercent;
          editRangeKm.value = fuelState.rangeKm;
          previewEditorData("rangeKm");
        }, DEBOUNCE_MS);
      });

      [editLastUpdated, editMapRoad, editMapCommunity, editMapPolice].forEach((field) => {
        field.addEventListener("input", () => {
          clearTimeout(renderTimer);
          renderTimer = setTimeout(() => previewEditorData(lastEditorFuelSource), DEBOUNCE_MS);
        });
      });

      editPanel.addEventListener("submit", (event) => {
        event.preventDefault();
        const vehicle = readEditorVehicle(lastEditorFuelSource);
        applyVehicleData(vehicle, true, lastEditorFuelSource);
        persistVehicleData(currentVehicle);
        closeEditor(false);
      });

      document.querySelector("#editCancel").addEventListener("click", () => closeEditor(true));

      vehicleStageImage.addEventListener("error", () => {
        if (vehicleStageImage.src.endsWith(vehicleStageImage.dataset.fallbackSrc || "")) return;
        vehicleStageImage.src = vehicleStageImage.dataset.fallbackSrc || "assets/models/530li-black.jpg";
      });

      vehicleSwitchHotspot.addEventListener("click", (event) => {
        event.stopPropagation();
        root.classList.contains("is-garage-open") ? closeGarage() : openGarage();
      });

      garageClose.addEventListener("click", (event) => {
        event.stopPropagation();
        closeGarage();
      });

      garageColorButtons.forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          const color = ["black", "white", "accent"].includes(button.dataset.color)
            ? button.dataset.color
            : "black";
          setGarageState({ color });
        });
      });

      garageBackgroundButtons.forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          const background = ["original", "letter-blue", "letter-pink"].includes(button.dataset.background)
            ? button.dataset.background
            : "original";
          setGarageState({ background });
        });
      });

      garageEraButtons.forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          const era = button.dataset.era === "classic" ? "classic" : "current";
          setGarageState({ era, ...(era === "classic" ? { color: "accent" } : {}) });
        });
      });

      garageCategoryButtons.forEach((button) => {
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          const category = ["sedan", "coupe", "suv"].includes(button.dataset.category)
            ? button.dataset.category
            : "sedan";
          garageCategory = category;
          const firstModel = VEHICLE_MODELS.find((model) => model.category === category);
          if (firstModel && selectedGarageModel().category !== category) {
            setGarageState({ modelId: firstModel.id });
          } else {
            renderGaragePanel();
            renderGarageState();
          }
        });
      });

      garageModelList.addEventListener("click", (event) => {
        const button = event.target.closest(".garage-model");
        if (!button) return;
        event.stopPropagation();
        setGarageState({ modelId: button.dataset.modelId });
      });

      document.querySelectorAll(".edit-hotspot:not(.vehicle-switch-hotspot)").forEach((hotspot) => {
        hotspot.addEventListener("click", openEditor);
        hotspot.addEventListener("contextmenu", (event) => event.preventDefault());
      });

      document.addEventListener("click", (event) => {
        if (!root.classList.contains("is-garage-open")) return;
        if (event.target.closest("#garagePanel, #vehicleSwitchHotspot")) return;
        closeGarage();
      });

      document.addEventListener("contextmenu", (event) => event.preventDefault());
      document.addEventListener("dragstart", (event) => event.preventDefault());
      document.addEventListener("selectstart", (event) => event.preventDefault());

      root.addEventListener("pointerdown", (event) => {
        if (event.target.closest(".vehicle-switch-hotspot, .garage-panel")) return;
        if (!event.target.closest(".model-name, .updated-text, .fuel-percent-text, .range-text, .edit-hotspot")) return;
        editPressTimer = setTimeout(openEditor, 650);
      });

      root.addEventListener("pointerup", () => clearTimeout(editPressTimer));
      root.addEventListener("pointercancel", () => clearTimeout(editPressTimer));

      window.addEventListener("resize", fitViewport);
      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        let reloadingForUpdate = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (reloadingForUpdate) return;
          reloadingForUpdate = true;
          location.reload();
        });
        navigator.serviceWorker.register("./service-worker.js", { scope: "./" })
          .then((registration) => registration.update())
          .catch(() => {});
      }
      renderGaragePanel();
      renderGarageState();
      fitViewport();
      syncSystemTime();
      setInterval(syncSystemTime, 1000);
      syncBatteryStatus();
      loadData();
    </script>
  </body>
</html>
